name: Release

on:
  push:
    tags:
      - 'v*'
      - '*-v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: npx vitest run

      - name: Publish @gitpm/core
        run: npm publish --provenance --access public
        working-directory: packages/core
        continue-on-error: true

      - name: Publish @gitpm/sync-github
        run: npm publish --provenance --access public
        working-directory: packages/sync-github
        continue-on-error: true

      - name: Publish @gitpm/sync-gitlab
        run: npm publish --provenance --access public
        working-directory: packages/sync-gitlab
        continue-on-error: true

      - name: Publish @gitpm/sync-jira
        run: npm publish --provenance --access public
        working-directory: packages/sync-jira
        continue-on-error: true

      - name: Publish @gitpm/cli
        run: npm publish --provenance --access public
        working-directory: packages/cli
        continue-on-error: true

      - name: Publish @gitpm/ui
        run: npm publish --provenance --access public
        working-directory: packages/ui
        continue-on-error: true
