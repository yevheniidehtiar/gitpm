name: Release

on:
  push:
    tags:
      - 'v*'
      - '@gitpm/*-v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: npx vitest run

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json

      - name: Publish @gitpm/core
        run: npm publish --provenance --access public
        working-directory: packages/core
        continue-on-error: true

      - name: Publish @gitpm/sync-github
        run: npm publish --provenance --access public
        working-directory: packages/sync-github
        continue-on-error: true

      - name: Publish @gitpm/sync-gitlab
        run: npm publish --provenance --access public
        working-directory: packages/sync-gitlab
        continue-on-error: true

      - name: Publish @gitpm/sync-jira
        run: npm publish --provenance --access public
        working-directory: packages/sync-jira
        continue-on-error: true

      - name: Publish @gitpm/cli
        run: npm publish --provenance --access public
        working-directory: packages/cli
        continue-on-error: true

      - name: Publish @gitpm/ui
        run: npm publish --provenance --access public
        working-directory: packages/ui
        continue-on-error: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${{ github.ref_name }})
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${{ github.ref_name }})
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true
          files: sbom.cdx.json
