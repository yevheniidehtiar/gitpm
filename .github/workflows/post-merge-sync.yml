name: Post-Merge Sync

# Final stage of the story lifecycle chain (see "Task Lifecycle & PR Linkage"
# in CLAUDE.md). Fires on any push to master that touches `.meta/**` — in
# particular when a release PR merges carrying the `chore(pm): mark shipped
# stories as done` commit written by `release-please.yml`. `gitpm push` then
# closes every GitHub issue whose story is now `status: done` (mapper at
# packages/sync-github/src/mapper.ts:232-235 maps done/cancelled → closed).
#
# Also exposes `workflow_dispatch` so a maintainer can run the sync manually
# from the Actions UI — useful when the workflow was disabled or a previous
# run failed and `.meta/` is out of sync with GitHub Issues.

on:
  push:
    branches: [master]
    paths:
      - '.meta/**'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync-to-github:
    name: Sync .meta/ to GitHub Issues
    runs-on: ubuntu-latest
    # workflow_dispatch lets the UI pick any branch, but the writeback step
    # below pushes to master — guard against a misclick that would overwrite
    # master with a feature branch's .meta/ state.
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Sync .meta/ to GitHub
        run: node packages/cli/dist/index.js push --token "$GITHUB_TOKEN" --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Persist sync writebacks (github.issue_number on entities,
      # .meta/sync/github-state.json) so the next push doesn't see entities
      # as new and create duplicate issues. [skip ci] avoids re-triggering.
      - name: Commit sync writebacks
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .meta/
          if git diff --cached --quiet; then
            echo "No sync writebacks to commit."
            exit 0
          fi
          git commit -m "chore(pm): persist GitHub sync metadata [skip ci]"
          git push origin HEAD:master
